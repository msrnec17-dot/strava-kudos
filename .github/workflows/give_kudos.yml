name: run-kudos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"   # 7:00 CEST (5:00 UTC)
    - cron: "0 8 * * *"   # 10:00 CEST (8:00 UTC)
    - cron: "0 10 * * *"  # 12:00 CEST (10:00 UTC)
    - cron: "0 12 * * *"  # 14:00 CEST (12:00 UTC)
    - cron: "0 14 * * *"  # 16:00 CEST (14:00 UTC)
    - cron: "0 17 * * *"  # 19:00 CEST (17:00 UTC)
    - cron: "0 19 * * *"  # 21:00 CEST (19:00 UTC)
    - cron: "0 21 * * *"  # 23:00 CEST (21:00 UTC)

jobs:
  run-kudos:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Linux browser dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libdbus-1-3 libdbus-glib-1-2 \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libasound2 libpangocairo-1.0-0 \
            libpango-1.0-0 libcairo2 libatspi2.0-0 libgtk-3-0

      - name: Install Playwright Firefox
        run: python -m playwright install firefox

      - name: Restore Strava session
        shell: bash
        run: |
          echo "${{ secrets.STRAVA_STATE_B64 }}" | base64 -d > strava_state.json
          ls -lh strava_state.json

      - name: Run kudos script
        run: python give_kudos.py
